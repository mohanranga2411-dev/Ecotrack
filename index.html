function analyzeProduct() {
  const input = document.getElementById("productInput").value.toLowerCase().trim();
  const resultCard = document.getElementById("resultCard");

  let found = null;

  for (let key in products) {
    if (input.includes(key)) {
      found = products[key];
      break;
    }
  }

  if (found) {
    document.getElementById("score").innerText = found.score + "/10";
    document.getElementById("message").innerText = found.message;
    document.getElementById("alternative").innerText = "Alternative: " + found.alternative;
  } else {
    document.getElementById("score").innerText = "N/A";
    document.getElementById("message").innerText = "No data found ❓";
    document.getElementById("alternative").innerText = "Try items like plastic bottle, toothbrush";
  }

  resultCard.style.display = "block";
}
